<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Explainability Dashboard Prototype</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:20px}
    .row{display:flex;gap:16px;align-items:flex-start}
    .card{border:1px solid #ddd;padding:12px;border-radius:6px;width:48%}
    img{max-width:100%;height:auto;border-radius:4px}
    select,button{padding:8px;margin-right:8px}
  </style>
</head>
<body>
  <h2>Explainability Dashboard Prototype</h2>
  <p>Load explanation images generated by the service (outputs/explanations).</p>

  <div>
    <label>Image path (relative): </label>
    <input id="imagePath" value="outputs/explanations/gradcam_layer4_2_conv2_1.png" style="width:60%" />
    <button id="loadBtn">Load</button>
  </div>

  <div class="row" style="margin-top:16px">
    <div class="card">
      <h4>Original / Overlay</h4>
      <img id="overlay" src="" alt="overlay" />
      <div id="meta"></div>
    </div>
    <div class="card">
      <h4>Heatmap / Raw</h4>
      <img id="heatmap" src="" alt="heatmap" />
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
